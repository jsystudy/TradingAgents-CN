services:
  # 后端服务
  - type: web
    name: tradingagents-backend
    runtime: docker
    dockerfilePath: ./Dockerfile.backend.render
    plan: free
    healthCheckPath: /api/health
    envVars:
      # MongoDB Atlas 连接字符串
      - key: MONGODB_URL
        sync: false
      # MongoDB 数据库名
      - key: MONGODB_DATABASE
        value: "tradingagents"
      - key: MONGODB_DATABASE_SCOPE
        value: "explicit"
      # Redis 连接（从 Render Redis 服务自动获取）
      - key: REDIS_URL
        fromService:
          name: tradingagents-redis
          type: redis
          property: connectionString
      # JWT 密钥
      - key: JWT_SECRET
        value: "tradingagents-render-jwt-secret-2026"
      # 生产环境
      - key: DEBUG
        value: "false"
      # API 配置
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "8000"
      # CORS 配置
      - key: CORS_ORIGINS
        value: "*"
      # 时区
      - key: TZ
        value: "Asia/Shanghai"
      # 日志
      - key: LOG_LEVEL
        value: "INFO"
      # Docker 标识
      - key: DOCKER_CONTAINER
        value: "true"

  # 前端服务
  - type: web
    name: tradingagents-frontend
    runtime: docker
    dockerfilePath: ./Dockerfile.frontend.render
    plan: free
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://tradingagents-backend-kfv.onrender.com"
      - key: BACKEND_URL
        value: "https://tradingagents-backend-kfv.onrender.com"

  # Redis 数据库
  - type: redis
    name: tradingagents-redis
    plan: free
    ipAllowList: []
