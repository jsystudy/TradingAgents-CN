services:
  # 后端服务
  - type: web
    name: tradingagents-backend
    runtime: docker
    dockerfilePath: ./Dockerfile.backend.render
    plan: free
    healthCheckPath: /api/health
    envVars:
      # MongoDB Atlas 连接字符串（必需）
      # 格式：mongodb+srv://username:password@cluster.mongodb.net/tradingagents
      - key: MONGODB_URL
        sync: false
      # Redis 连接字符串（自动从 Render Redis 服务获取）
      - key: REDIS_URL
        fromService:
          name: tradingagents-redis
          type: redis
          property: connectionString
      # Docker 环境标识
      - key: DOCKER_CONTAINER
        value: "true"
      # API 配置
      - key: API_HOST
        value: "0.0.0.0"
      - key: API_PORT
        value: "8000"
      # CORS 配置（允许前端域名访问）
      - key: CORS_ORIGINS
        value: "https://tradingagents-frontend.onrender.com"
      # 时区设置
      - key: TZ
        value: "Asia/Shanghai"
      # 日志配置
      - key: LOG_LEVEL
        value: "INFO"
      # 数据库配置（使用环境变量）
      - key: MONGODB_DATABASE
        value: "tradingagents"
      - key: MONGODB_DATABASE_SCOPE
        value: "explicit"

  # 前端服务
  - type: web
    name: tradingagents-frontend
    runtime: docker
    dockerfilePath: ./Dockerfile.frontend.render
    plan: free
    envVars:
      # 后端 API 地址
      - key: VITE_API_BASE_URL
        value: "https://tradingagents-backend.onrender.com"

  # Redis 数据库
  - type: redis
    name: tradingagents-redis
    plan: free
    ipAllowList: []
